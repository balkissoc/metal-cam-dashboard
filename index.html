<!doctype html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jimmy's Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="topbar">
    <div class="title-wrap">
      <h1 id="siteTitle">Jimmy's Dashboard</h1>
      <p id="siteSubtitle" class="subtitle">Gold and silver in AUD · Live cameras worldwide</p>
    </div>
  </header>

  <!-- ── News ticker bar ──────────────────────────────────── -->
  <div class="news-bar">
    <div id="newsTicker"></div>
  </div>

  <main class="dashboard">

    <div class="top-cards">
      <div class="card">
        <div class="card-title">Gold (AUD)</div>
        <div id="goldTicker" class="widget-short"></div>
      </div>
      <div class="card">
        <div class="card-title">Silver (AUD)</div>
        <div id="silverTicker" class="widget-short"></div>
      </div>
    </div>

    <div class="chart-row">
      <div class="panel">
        <div class="panel-header"><h2>Gold Price Chart (AUD)</h2></div>
        <div id="goldChart" class="widget-tall"></div>
      </div>
      <div class="panel">
        <div class="panel-header"><h2>Silver Price Chart (AUD)</h2></div>
        <div id="silverChart" class="widget-tall"></div>
      </div>
    </div>

    <!-- ── News headlines panel ──────────────────────────── -->
    <div class="panel">
      <div class="panel-header"><h2>Top Headlines</h2></div>
      <div id="newsPanel" class="news-panel"></div>
    </div>

    <div class="panel">
      <div class="panel-header"><h2>Australia Cameras</h2></div>
      <div id="camsAustralia" class="camera-grid"></div>
    </div>

    <div class="panel">
      <div class="panel-header"><h2>Iran &amp; Middle East Cameras</h2></div>
      <div id="camsIran" class="camera-grid"></div>
    </div>

    <div class="panel">
      <div class="panel-header"><h2>USA Cameras</h2></div>
      <div id="camsUSA" class="camera-grid"></div>
    </div>

  </main>

  <footer class="footer">
    <p>
      Charts and prices by <a href="https://www.tradingview.com" target="_blank" rel="noopener">TradingView</a>.
      Camera feeds are public YouTube live streams.
    </p>
  </footer>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
