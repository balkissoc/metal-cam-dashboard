<!doctype html>
<html lang="en-AU" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jimmy's Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="topbar">
    <div class="title-wrap">
      <h1 id="siteTitle">Jimmy's Dashboard</h1>
      <p id="siteSubtitle" class="subtitle">Gold and silver in AUD · Live cameras worldwide</p>
    </div>
    <button class="theme-toggle" id="themeToggle" title="Toggle light/dark mode" aria-label="Toggle light/dark mode">
      <span class="theme-icon">☀️</span>
    </button>
  </header>

  <!-- Scrolling instrument ticker bar -->
  <div class="news-bar">
    <div id="newsTicker"></div>
  </div>

  <main class="dashboard">

    <!-- Price ticker cards -->
    <div class="top-cards">
      <div class="card">
        <div class="card-title">Gold (AUD)</div>
        <div id="goldTicker" class="widget-short"></div>
      </div>
      <div class="card">
        <div class="card-title">Silver (AUD)</div>
        <div id="silverTicker" class="widget-short"></div>
      </div>
    </div>

    <!-- 2x2 chart grid — all equal size -->
    <div class="chart-row">
      <div class="panel">
        <div class="panel-header"><h2>Gold (AUD)</h2></div>
        <div id="goldChart" class="widget-tall"></div>
      </div>
      <div class="panel">
        <div class="panel-header"><h2>Silver (AUD)</h2></div>
        <div id="silverChart" class="widget-tall"></div>
      </div>
      <div class="panel">
        <div class="panel-header"><h2>S&amp;P 500</h2></div>
        <div id="spxChart" class="widget-tall"></div>
      </div>
      <div class="panel">
        <div class="panel-header"><h2>Crude Oil (USD — WTI)</h2></div>
        <div id="oilChart" class="widget-tall"></div>
      </div>
    </div>

    <!-- Top Headlines -->
    <div class="panel">
      <div class="panel-header"><h2>Top Headlines</h2></div>
      <div id="newsPanel" class="news-panel"></div>
    </div>

    <!-- Camera panels -->
    <div class="panel">
      <div class="panel-header"><h2>Asia-Pacific &amp; Middle East</h2></div>
      <div id="camsAustralia" class="camera-grid"></div>
    </div>

    <div class="panel">
      <div class="panel-header"><h2>Iran &amp; Middle East</h2></div>
      <div id="camsIran" class="camera-grid"></div>
    </div>

    <div class="panel">
      <div class="panel-header"><h2>USA</h2></div>
      <div id="camsUSA" class="camera-grid"></div>
    </div>

  </main>

  <footer class="footer">
    <p>
      Charts and prices by <a href="https://www.tradingview.com" target="_blank" rel="noopener">TradingView</a>.
      Camera feeds are public YouTube live streams.
    </p>
  </footer>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
